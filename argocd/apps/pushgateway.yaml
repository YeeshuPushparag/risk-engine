apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: pushgateway
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/YeeshuPushparag/risk-engine.git
    targetRevision: main
    path: helm/pushgateway
    helm:
      releaseName: pushgateway

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
      - RespectIgnoreDifferences=true