kube-prometheus-stack:

  ##################################
  # CRDs (ARGOCD FIX)
  ##################################
  crds:
    enabled: true

  ##################################
  # PROMETHEUS
  ##################################
  prometheus:
    serviceAccount:
      create: true
      name: prometheus
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::922967232801:role/risk-engine-prometheus-irsa-role

    prometheusSpec:
      retention: 15d

      nodeSelector:
        role: monitoring

      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: gp3
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 100Gi

      ##################################
      # ADDITIONAL SCRAPES
      ##################################
      additionalScrapeConfigs:
        # Jenkins EC2
        - job_name: "jenkins-ec2"
          static_configs:
            - targets:
                - "ip-10-0-1-176.ec2.internal:9100"

        # CloudWatch Exporter (RDS + Redis)
        - job_name: "cloudwatch-exporter"
          static_configs:
            - targets:
                - "cloudwatch-exporter.monitoring.svc.cluster.local:9106"

  ##################################
  # GRAFANA
  ##################################
  grafana:

    defaultDashboardsEnabled: true

    sidecar:
      dashboards:
        enabled: true
        label: grafana_dashboard
        labelValue: "1"
        searchNamespace: ALL

    admin:
      existingSecret: grafana-admin-secret
      userKey: admin-user
      passwordKey: admin-password

    nodeSelector:
      role: monitoring

    ingress:
      enabled: true
      ingressClassName: alb

      annotations:
        kubernetes.io/ingress.class: alb
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
        alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:922967232801:certificate/e0af3110-f363-4d3e-85a0-2e428d4cd4a6
        alb.ingress.kubernetes.io/ssl-redirect: "443"
        alb.ingress.kubernetes.io/group.name: risk-engine
        alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=3600

      hosts:
        - grafana.pushparag.online

      paths:
        - /

    persistence:
      enabled: true
      storageClassName: gp3
      size: 20Gi

  ##################################
  # ALERTMANAGER
  ##################################
  alertmanager:
    alertmanagerSpec:
      nodeSelector:
        role: monitoring

##################################
# CLOUDWATCH EXPORTER
##################################
cloudwatchExporter:
  enabled: true
  serviceAccount:
    create: false
    name: prometheus

  config: |
    region: us-east-1
    metrics:

      # RDS
      - aws_namespace: AWS/RDS
        aws_metric_name: CPUUtilization
        aws_dimensions: [DBInstanceIdentifier]
        aws_dimension_select:
          DBInstanceIdentifier: ["risk-postgres"]
        aws_statistics: [Average]

      - aws_namespace: AWS/RDS
        aws_metric_name: DatabaseConnections
        aws_dimensions: [DBInstanceIdentifier]
        aws_dimension_select:
          DBInstanceIdentifier: ["risk-postgres"]
        aws_statistics: [Average]

      - aws_namespace: AWS/RDS
        aws_metric_name: FreeStorageSpace
        aws_dimensions: [DBInstanceIdentifier]
        aws_dimension_select:
          DBInstanceIdentifier: ["risk-postgres"]
        aws_statistics: [Average]

      # Redis
      - aws_namespace: AWS/ElastiCache
        aws_metric_name: CPUUtilization
        aws_dimensions: [CacheClusterId]
        aws_dimension_select:
          CacheClusterId: ["risk-redis"]
        aws_statistics: [Average]

      - aws_namespace: AWS/ElastiCache
        aws_metric_name: CurrConnections
        aws_dimensions: [CacheClusterId]
        aws_dimension_select:
          CacheClusterId: ["risk-redis"]
        aws_statistics: [Average]

      - aws_namespace: AWS/ElastiCache
        aws_metric_name: FreeableMemory
        aws_dimensions: [CacheClusterId]
        aws_dimension_select:
          CacheClusterId: ["risk-redis"]
        aws_statistics: [Average]