prometheus-cloudwatch-exporter:

  ##################################
  # Service Account (IRSA)
  ##################################
  serviceAccount:
    create: false
    name: prometheus

  ##################################
  # AWS Region
  ##################################
  aws:
    region: us-east-1

  ##################################
  # Service
  ##################################
  service:
    type: ClusterIP
    port: 9106

  ##################################
  # ServiceMonitor (Prometheus)
  ##################################
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels:
      release: monitoring

  ##################################
  # CloudWatch Metrics Configuration
  ##################################
  config: |
    region: us-east-1
    metrics:

      ##################################################
      # RDS - risk-postgres
      ##################################################
      - aws_namespace: AWS/RDS
        aws_metric_name: CPUUtilization
        aws_dimensions: [DBInstanceIdentifier]
        aws_dimension_select:
          DBInstanceIdentifier:
            - risk-postgres
        aws_statistics: [Average]
        period_seconds: 300
        range_seconds: 600

      ##################################################
      # Redis - risk-redis (FIXED DIMENSION)
      ##################################################
      - aws_namespace: AWS/ElastiCache
        aws_metric_name: CPUUtilization
        aws_dimensions: [CacheClusterId]
        aws_dimension_select:
          CacheClusterId:
            - risk-redis
        aws_statistics: [Average]
        period_seconds: 300
        range_seconds: 600