prometheus-cloudwatch-exporter:

  ############################################
  # SERVICE ACCOUNT (IRSA)
  ############################################
  serviceAccount:
    create: false
    name: prometheus

  ############################################
  # AWS REGION
  ############################################
  aws:
    region: us-east-1

  ############################################
  # SERVICE
  ############################################
  service:
    type: ClusterIP
    port: 9106

  ############################################
  # PROMETHEUS DISCOVERY (ServiceMonitor)
  ############################################
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels:
      release: monitoring

  ############################################
  # CLOUDWATCH EXPORTER CONFIG
  ############################################
  config: |
    region: us-east-1

    metrics:

      ################################################
      # RDS — risk-postgres ✅ (already correct)
      ################################################
      - aws_namespace: AWS/RDS
        aws_metric_name: CPUUtilization
        aws_dimensions:
          - DBInstanceIdentifier
        aws_dimension_select:
          DBInstanceIdentifier:
            - risk-postgres
        aws_statistics:
          - Average
        period_seconds: 300
        range_seconds: 600

      ################################################
      # ELASTICACHE — risk-redis ✅ FIXED
      # (REQUIRES CacheNodeId dimension)
      ################################################
      - aws_namespace: AWS/ElastiCache
        aws_metric_name: CPUUtilization
        aws_dimensions:
          - CacheClusterId
          - CacheNodeId
        aws_dimension_select:
          CacheClusterId:
            - risk-redis
        aws_statistics:
          - Average
        period_seconds: 300
        range_seconds: 600