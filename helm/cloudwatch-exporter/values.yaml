prometheus-cloudwatch-exporter:

  ##################################
  # SERVICE ACCOUNT (IRSA)
  ##################################
  serviceAccount:
    create: false
    name: prometheus

  ##################################
  # AWS REGION
  ##################################
  aws:
    region: us-east-1

  ##################################
  # SERVICE
  ##################################
  service:
    type: ClusterIP
    port: 9106

  ##################################
  # SERVICEMONITOR
  ##################################
  serviceMonitor:
    enabled: true
    namespace: monitoring

    # THIS LABEL MUST MATCH PROMETHEUS SELECTOR
    labels:
      release: monitoring

    interval: 30s
    scrapeTimeout: 10s

  ##################################
  # CLOUDWATCH METRICS CONFIG
  ##################################
  config: |
    region: us-east-1
    metrics:

      ##################################################
      # RDS — risk-postgres
      ##################################################
      - aws_namespace: AWS/RDS
        aws_metric_name: CPUUtilization
        aws_dimensions: [DBInstanceIdentifier]
        aws_dimension_select:
          DBInstanceIdentifier:
            - risk-postgres
        aws_statistics: [Average]
        period_seconds: 300
        range_seconds: 3600

      ##################################################
      # ELASTICACHE — risk-redis
      ##################################################
      - aws_namespace: AWS/ElastiCache
        aws_metric_name: CPUUtilization
        aws_dimensions: [CacheClusterId]
        aws_dimension_select:
          CacheClusterId:
            - risk-redis
        aws_statistics: [Average]
        period_seconds: 300
        range_seconds: 3600