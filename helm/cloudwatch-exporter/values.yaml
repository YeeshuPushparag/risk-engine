prometheus-cloudwatch-exporter:

  serviceAccount:
    create: false
    name: prometheus

  aws:
    region: us-east-1

  service:
    type: ClusterIP
    port: 9106

  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s
    scrapeTimeout: 10s
    additionalLabels:
      release: monitoring

  config: |
    region: us-east-1
    metrics:

      # ======================
      # RDS (risk-postgres)
      # ======================
      - aws_namespace: AWS/RDS
        aws_metric_name: CPUUtilization
        aws_dimensions: [DBInstanceIdentifier]
        aws_dimension_select:
          DBInstanceIdentifier:
            - risk-postgres
        aws_statistics: [Average]
        period_seconds: 300
        range_seconds: 600

      # ======================
      # REDIS (risk-redis)
      # ======================
      - aws_namespace: AWS/ElastiCache
        aws_metric_name: CPUUtilization
        aws_dimensions: [ReplicationGroupId]
        aws_dimension_select:
          ReplicationGroupId:
            - risk-redis
        aws_statistics: [Average]
        period_seconds: 300
        range_seconds: 600