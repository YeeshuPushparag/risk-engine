apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  namespace: airflow
data:
  # =========================
  # Core
  # =========================
  AIRFLOW__CORE__EXECUTOR: CeleryExecutor
  AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"

  # REQUIRED for Airflow 3.x
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow.airflow.svc.cluster.local:8080/execution/
  AIRFLOW__CELERY__WORKER_CONCURRENCY: "4"
  # =========================
  # Authentication
  # =========================
  AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
  AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth

  # =========================
  # Logging — S3 ONLY
  # =========================
  AIRFLOW__LOGGING__USE_SERVED_LOGS: "False"
  AIRFLOW__LOGGING__REMOTE_LOGGING: "True"
  AIRFLOW__LOGGING__LOGGING_LEVEL: "INFO"

  AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: s3://pushparag-airflow-logs/logs
  AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: aws_default

  # =========================
  # Web / API
  # =========================
  AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "True"
  AIRFLOW__WEBSERVER__BASE_URL: https://airflow.pushparag.online

  # =========================
  # Hostname (safe defaults)
  # =========================
  AIRFLOW__CORE__HOSTNAME_CALLABLE: airflow.utils.net.get_host_ip_address
  AIRFLOW__API__HOSTNAME_CALLABLE: airflow.utils.net.get_host_ip_address
  AIRFLOW__LOGGING__HOSTNAME_CALLABLE: airflow.utils.net.get_host_ip_address

  # =========================
  # Misc
  # =========================
  PYTHONPATH: /opt/airflow