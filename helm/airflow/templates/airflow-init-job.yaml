apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-init-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: airflow-init
  annotations:
    # Ensures ArgoCD deletes and recreates the Job every sync
    argocd.argoproj.io/sync-options: Replace=true
spec:
  ttlSecondsAfterFinished: 180   # Cleanup finished jobs after 3 minutes
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: airflow-init
    spec:
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      restartPolicy: OnFailure
      containers:
        - name: airflow-init
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: Always    # <-- Force Kubernetes to always fetch latest image
          command: ["/entrypoint"]
          args: ["airflow", "db", "migrate"]
          envFrom:
            - configMapRef:
                name: {{ .Values.envFrom.configMapName }}
            - secretRef:
                name: {{ .Values.envFrom.secretName }}
