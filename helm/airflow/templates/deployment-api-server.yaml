apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-api
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount.apiServer }}
  selector:
    matchLabels:
      app: airflow-api
  template:
    metadata:
      labels:
        app: airflow-api
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:15
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              echo "Waiting for Postgres to be reachable..."
              until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT"; do
                echo "Postgres not ready yet..."
                sleep 5
              done
              echo "Postgres is reachable."
          envFrom:
            - secretRef:
                name: {{ .Values.envFrom.secretName }}

      containers:
        - name: airflow-api
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["airflow"]
          args: ["api-server", "--port", "8080"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ .Values.envFrom.configMapName }}
            - secretRef:
                name: {{ .Values.envFrom.secretName }}
          env:
            - name: AIRFLOW_CONFIG
              value: "/dev/null"

---
apiVersion: v1
kind: Service
metadata:
  name: airflow
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: airflow-api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      name: http
  type: {{ .Values.service.type }}
